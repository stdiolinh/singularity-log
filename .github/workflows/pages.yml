# Build static site into docs/ and deploy to GitHub Pages.
# Repo Settings → Pages → Source: must be "GitHub Actions" (not "Deploy from a branch / root"
# or /docs alone), or the site can serve stale root files while Actions updates something else.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build docs/
        run: npm run build:pages
        env:
          # Optional: set in repo Settings → Secrets → Actions → PAGES_API_BASE
          # to your public Node API URL, e.g. https://singularity-api.onrender.com
          PAGES_API_BASE: ${{ secrets.PAGES_API_BASE }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
